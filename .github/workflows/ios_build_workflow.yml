name: Build iOS dylib (v4.3.0 Support)

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'URL of the zip file to build'
        required: true
      chat_id:
        description: 'Telegram Chat ID to send the result back'
        required: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Download source
        run: |
          curl -L "${{ github.event.inputs.file_url }}" -o project.zip
          mkdir source_code
          unzip project.zip -d source_code

      - name: Compile dylib
        id: compile
        run: |
          cd source_code
          
          # البحث عن كافة ملفات المصدر في جميع المجلدات الفرعية
          SOURCES=$(find . -name "*.c" -o -name "*.cpp" -o -name "*.m" -o -name "*.mm" -o -name "*.swift")
          
          if [ -z "$SOURCES" ]; then
            echo "ERROR_MSG=❌ فشل البناء. لم يتم العثور على أي ملفات مصدر (.c, .cpp, .swift, .m, .mm) داخل الملف المضغوط. يرجى التأكد من محتوى الملف." >> $GITHUB_ENV
            exit 1
          fi

          # تحديد المعمارية والـ SDK
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          ARCH="-arch arm64"
          
          # إعدادات إضافية للتوافق مع ببجي 4.3.0 وكافة النسخ
          # -miphoneos-version-min=14.0 لضمان العمل على أغلب الأجهزة الحديثة
          # -dynamiclib لإنشاء ملف dylib
          # -undefined dynamic_lookup للسماح بالبحث عن الرموز أثناء التشغيل (مهم للحقن)
          COMMON_FLAGS="$ARCH -isysroot $SDK_PATH -miphoneos-version-min=14.0 -dynamiclib -undefined dynamic_lookup -fembed-bitcode -O3"
          
          # فصل ملفات Swift عن ملفات C/C++/ObjC
          SWIFT_SOURCES=$(find . -name "*.swift")
          C_SOURCES=$(find . -name "*.c" -o -name "*.cpp" -o -name "*.m" -o -name "*.mm")

          if [ ! -z "$SWIFT_SOURCES" ]; then
            echo "Compiling Swift sources for PUBG 4.3.0..."
            swiftc -emit-library -o output.dylib $ARCH -sdk $SDK_PATH $SWIFT_SOURCES $C_SOURCES -O -whole-module-optimization || { echo "ERROR_MSG=❌ فشل البناء أثناء ترجمة ملفات Swift. يرجى التأكد من سلامة الكود." >> $GITHUB_ENV; exit 1; }
          else
            echo "Compiling C/C++/ObjC sources for PUBG 4.3.0..."
            clang $COMMON_FLAGS -o output.dylib $C_SOURCES -framework Foundation -framework UIKit -framework QuartzCore || { echo "ERROR_MSG=❌ فشل البناء أثناء ترجمة ملفات C/ObjC. يرجى التأكد من سلامة الكود." >> $GITHUB_ENV; exit 1; }
          fi
          echo "BUILD_SUCCESS=true" >> $GITHUB_ENV

      - name: Upload Artifact
        if: env.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ios-dylib
          path: source_code/output.dylib

      - name: Send Success to Telegram
        if: env.BUILD_SUCCESS == 'true'
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
        run: |
          curl -F "chat_id=$CHAT_ID" -F "document=@source_code/output.dylib" -F "caption=✅ تم بناء ملف الـ .dylib بنجاح لـ iOS ARM64! 🚀\n📦 متوافق مع ببجي 4.3.0 وكافة النسخ." "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendDocument"

      - name: Send Failure to Telegram
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
        run: |
          MSG="${{ env.ERROR_MSG }}"
          if [ -z "$MSG" ]; then MSG="❌ حدث خطأ غير متوقع أثناء عملية البناء على GitHub Actions."; fi
          curl -X POST "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" -d "chat_id=$CHAT_ID&text=$MSG"
