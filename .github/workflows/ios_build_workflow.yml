name: Build iOS dylib

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'URL of the zip/tar.gz file to build'
        required: true
      chat_id:
        description: 'Telegram Chat ID to send the result back'
        required: true
      dylib_name:
        description: 'Name for the output dylib file (without extension)'
        required: false
        default: 'output'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Download and extract source
        run: |
          FILE_URL="${{ github.event.inputs.file_url }}"

          if [[ "$FILE_URL" == *.tar.gz ]]; then
            curl -L "$FILE_URL" -o project.tar.gz
            mkdir -p source_code
            tar -xzf project.tar.gz -C source_code
          else
            curl -L "$FILE_URL" -o project.zip
            mkdir -p source_code
            unzip -o -q project.zip -d source_code
          fi

          find source_code -name "__MACOSX" -exec rm -rf {} + 2>/dev/null || true
          find source_code -name ".DS_Store" -delete 2>/dev/null || true

          # Fix spaces in directory names by replacing them with underscores
          cd source_code
          find . -depth -name "* *" | while IFS= read -r f; do
            dir=$(dirname "$f")
            base=$(basename "$f")
            newbase=$(echo "$base" | tr ' ' '_')
            if [ "$base" != "$newbase" ]; then
              mv "$f" "$dir/$newbase"
              echo "Renamed: $f -> $dir/$newbase"
            fi
          done

          echo "=== Extracted files ==="
          find . -type f | head -200

      - name: Compile dylib
        shell: bash
        run: |
          cd source_code

          DYLIB_NAME="${{ github.event.inputs.dylib_name }}"
          OUTPUT="${DYLIB_NAME}.dylib"
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          ARCH="-arch arm64"
          BUILD_LOG=$(mktemp)
          CHAT_ID="${{ github.event.inputs.chat_id }}"
          BOT_TOKEN="${{ secrets.TELEGRAM_TOKEN }}"

          send_telegram() {
            local MSG="$1"
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${CHAT_ID}" \
              --data-urlencode "text=${MSG}"
          }

          FRAMEWORK_FLAGS=""
          FW_SEARCH_ARGS=()
          while IFS= read -r fw_dir; do
            [ -z "$fw_dir" ] && continue
            fw_name=$(basename "$fw_dir" .framework)
            FRAMEWORK_FLAGS="$FRAMEWORK_FLAGS -framework $fw_name"
            fw_parent=$(dirname "$fw_dir")
            FW_SEARCH_ARGS+=("-F$fw_parent")
            echo "Found framework: $fw_name at $fw_dir"
          done < <(find . -name "*.framework" -type d 2>/dev/null)

          SRC_LIST=$(mktemp)
          find . -name "*.c" -not -path "*/.vscode/*" -not -path "*/xcuserdata/*" -not -path "*/.xcodeproj/*" -not -path "*/xcworkspace/*" -type f > "${SRC_LIST}.c"
          find . \( -name "*.cpp" -o -name "*.cxx" -o -name "*.cc" \) -not -path "*/.vscode/*" -not -path "*/xcuserdata/*" -not -path "*/.xcodeproj/*" -type f > "${SRC_LIST}.cpp"
          find . -name "*.m" -not -path "*/.vscode/*" -not -path "*/xcuserdata/*" -not -path "*/.xcodeproj/*" -type f > "${SRC_LIST}.m"
          find . -name "*.mm" -not -path "*/.vscode/*" -not -path "*/xcuserdata/*" -not -path "*/.xcodeproj/*" -type f > "${SRC_LIST}.mm"
          find . -name "*.swift" -not -path "*/.vscode/*" -not -path "*/xcuserdata/*" -not -path "*/.xcodeproj/*" -type f > "${SRC_LIST}.swift"

          C_COUNT=$(wc -l < "${SRC_LIST}.c" | tr -d ' ')
          CPP_COUNT=$(wc -l < "${SRC_LIST}.cpp" | tr -d ' ')
          OBJC_COUNT=$(wc -l < "${SRC_LIST}.m" | tr -d ' ')
          OBJCPP_COUNT=$(wc -l < "${SRC_LIST}.mm" | tr -d ' ')
          SWIFT_COUNT=$(wc -l < "${SRC_LIST}.swift" | tr -d ' ')
          TOTAL=$((C_COUNT + CPP_COUNT + OBJC_COUNT + OBJCPP_COUNT + SWIFT_COUNT))

          echo "Found $TOTAL source files: $C_COUNT C, $CPP_COUNT C++, $OBJC_COUNT ObjC, $OBJCPP_COUNT ObjC++, $SWIFT_COUNT Swift"

          if [ "$TOTAL" -eq 0 ]; then
            send_telegram "❌ فشل البناء: لم يتم العثور على ملفات مصدر داخل الملف المرسل.

          الملفات المدعومة: .swift .m .mm .c .cpp .cxx .cc"
            exit 1
          fi

          INCLUDE_ARGS=()
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            INCLUDE_ARGS+=("-I$dir")
          done < <(find . -type d -not -path "*/.xcodeproj/*" -not -path "*/xcuserdata/*" -not -path "*/xcworkspace/*" -not -path "*/.vscode/*" 2>/dev/null)

          COMMON_ARGS=($ARCH -isysroot "$SDK_PATH" -target arm64-apple-ios12.0 -DTARGET_OS_IPHONE=1)
          COMMON_ARGS+=(-Wno-unused-variable -Wno-unused-function -Wno-deprecated-declarations)
          COMMON_ARGS+=(-Wno-unused-but-set-variable -Wno-unused-value -Wno-nullability-completeness)
          COMMON_ARGS+=(-Wno-expansion-to-defined -Wno-nullable-to-nonnull-conversion)
          COMMON_ARGS+=(-Wno-incompatible-pointer-types -Wno-format -Wno-objc-method-access)
          COMMON_ARGS+=(-Wno-shorten-64-to-32 -Wno-comma -Wno-sign-conversion)
          COMMON_ARGS+=(-fvisibility=hidden -fvisibility-inlines-hidden)

          COMPILE_OK=true
          OBJ_LIST_FILE=$(mktemp)
          COMPILED=0

          compile_file() {
            local src="$1"
            local obj="$2"
            local compiler="$3"
            shift 3
            local extra_flags=("$@")

            COMPILED=$((COMPILED + 1))
            echo "[$COMPILED/$TOTAL] Compiling: $src"
            "$compiler" -c -o "$obj" "${COMMON_ARGS[@]}" "${INCLUDE_ARGS[@]}" "${FW_SEARCH_ARGS[@]}" "${extra_flags[@]}" "$src" 2>&1 | tee -a "$BUILD_LOG"
            local status=${PIPESTATUS[0]}
            if [ $status -ne 0 ]; then
              COMPILE_OK=false
              echo "FAILED: $src"
            else
              echo "$obj" >> "$OBJ_LIST_FILE"
            fi
          }

          while IFS= read -r src; do
            [ -z "$src" ] && continue
            obj="${src%.c}.o"
            compile_file "$src" "$obj" "clang"
          done < "${SRC_LIST}.c"

          while IFS= read -r src; do
            [ -z "$src" ] && continue
            obj="${src%.*}.o"
            compile_file "$src" "$obj" "clang++" "-std=c++17"
          done < "${SRC_LIST}.cpp"

          while IFS= read -r src; do
            [ -z "$src" ] && continue
            obj="${src%.m}.o"
            compile_file "$src" "$obj" "clang" "-x" "objective-c" "-fobjc-arc"
          done < "${SRC_LIST}.m"

          while IFS= read -r src; do
            [ -z "$src" ] && continue
            obj="${src%.mm}.o"
            compile_file "$src" "$obj" "clang++" "-x" "objective-c++" "-fobjc-arc" "-std=c++17"
          done < "${SRC_LIST}.mm"

          if [ "$SWIFT_COUNT" -gt 0 ]; then
            echo "=== Compiling Swift sources ==="
            SWIFT_ARGS=($ARCH -sdk "$SDK_PATH" -target arm64-apple-ios12.0)
            while IFS= read -r src; do
              [ -z "$src" ] && continue
              obj="${src%.swift}.o"
              COMPILED=$((COMPILED + 1))
              echo "[$COMPILED/$TOTAL] Compiling: $src"
              swiftc -c -o "$obj" "${SWIFT_ARGS[@]}" "${FW_SEARCH_ARGS[@]}" "$src" 2>&1 | tee -a "$BUILD_LOG"
              if [ ${PIPESTATUS[0]} -ne 0 ]; then
                COMPILE_OK=false
                echo "FAILED: $src"
              else
                echo "$obj" >> "$OBJ_LIST_FILE"
              fi
            done < "${SRC_LIST}.swift"
          fi

          if [ "$COMPILE_OK" = false ]; then
            ERROR_MSG=$(grep -i "error:" "$BUILD_LOG" | head -40)
            if [ -z "$ERROR_MSG" ]; then
              ERROR_MSG=$(tail -50 "$BUILD_LOG")
            fi
            send_telegram "❌ فشل البناء أثناء الترجمة.

          ${ERROR_MSG}"
            exit 1
          fi

          OBJ_COUNT=$(wc -l < "$OBJ_LIST_FILE" | tr -d ' ')
          echo "=== Linking $OBJ_COUNT object files ==="

          LINK_FRAMEWORKS="-framework Foundation -framework UIKit -framework Metal -framework MetalKit -framework AVFoundation -framework CoreGraphics -framework QuartzCore -framework Security"

          clang++ -dynamiclib -o "$OUTPUT" $ARCH -isysroot "$SDK_PATH" \
            -target arm64-apple-ios12.0 \
            -filelist "$OBJ_LIST_FILE" \
            "${FW_SEARCH_ARGS[@]}" \
            $LINK_FRAMEWORKS $FRAMEWORK_FLAGS \
            -fobjc-arc \
            -dead_strip \
            -Wl,-undefined,dynamic_lookup \
            -install_name @rpath/"$OUTPUT" \
            2>&1 | tee -a "$BUILD_LOG"

          if [ ! -f "$OUTPUT" ]; then
            ERROR_MSG=$(tail -50 "$BUILD_LOG")
            send_telegram "❌ فشل الربط. سبب الخطأ:

          ${ERROR_MSG}"
            exit 1
          fi

          echo "Build successful: $OUTPUT"
          ls -lh "$OUTPUT"
          file "$OUTPUT"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-dylib
          path: source_code/${{ github.event.inputs.dylib_name }}.dylib

      - name: Send dylib to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          DYLIB_NAME: ${{ github.event.inputs.dylib_name }}
        run: |
          OUTPUT_FILE="source_code/${DYLIB_NAME}.dylib"
          FILE_SIZE=$(du -sh "${OUTPUT_FILE}" | cut -f1)

          curl -s -F "chat_id=$CHAT_ID" \
            -F "document=@${OUTPUT_FILE};filename=${DYLIB_NAME}.dylib" \
            -F "caption=✅ تم البناء بنجاح!
          📦 الملف: ${DYLIB_NAME}.dylib
          📐 الحجم: ${FILE_SIZE}" \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument"
