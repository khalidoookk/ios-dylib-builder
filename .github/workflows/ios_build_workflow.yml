name: Build iOS dylib

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'URL of the zip/tar.gz file to build'
        required: true
      chat_id:
        description: 'Telegram Chat ID to send the result back'
        required: true
      dylib_name:
        description: 'Name for the output dylib file (without extension)'
        required: false
        default: 'output'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Download and extract source
        run: |
          FILE_URL="${{ github.event.inputs.file_url }}"

          if [[ "$FILE_URL" == *.tar.gz ]]; then
            curl -L "$FILE_URL" -o project.tar.gz
            mkdir -p source_code
            tar -xzf project.tar.gz -C source_code
          else
            curl -L "$FILE_URL" -o project.zip
            mkdir -p source_code
            unzip -o -q project.zip -d source_code
          fi

          find source_code -name "__MACOSX" -exec rm -rf {} + 2>/dev/null || true
          find source_code -name ".DS_Store" -delete 2>/dev/null || true

          echo "=== Extracted files ==="
          find source_code -type f | head -200

      - name: Compile dylib
        run: |
          cd source_code

          DYLIB_NAME="${{ github.event.inputs.dylib_name }}"
          OUTPUT="${DYLIB_NAME}.dylib"
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          ARCH="-arch arm64"
          BUILD_LOG=$(mktemp)
          CHAT_ID="${{ github.event.inputs.chat_id }}"
          BOT_TOKEN="${{ secrets.TELEGRAM_TOKEN }}"

          send_telegram() {
            local MSG="$1"
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              --data-urlencode "chat_id=${CHAT_ID}" \
              --data-urlencode "text=${MSG}"
          }

          FRAMEWORK_FLAGS=""
          FRAMEWORK_SEARCH=""
          while IFS= read -r -d '' fw_dir; do
            fw_name=$(basename "$fw_dir" .framework)
            FRAMEWORK_FLAGS="$FRAMEWORK_FLAGS -framework $fw_name"
            fw_parent=$(dirname "$fw_dir")
            FRAMEWORK_SEARCH="$FRAMEWORK_SEARCH -F\"$fw_parent\""
            echo "Found framework: $fw_name at $fw_dir"
          done < <(find . -name "*.framework" -type d -print0)

          mapfile -t C_SOURCES < <(find . -name "*.c" -not -path "*/.vscode/*" -not -path "*/xcuserdata/*" -type f)
          mapfile -t CPP_SOURCES < <(find . \( -name "*.cpp" -o -name "*.cxx" -o -name "*.cc" \) -not -path "*/.vscode/*" -not -path "*/xcuserdata/*" -type f)
          mapfile -t OBJC_SOURCES < <(find . -name "*.m" -not -path "*/.vscode/*" -not -path "*/xcuserdata/*" -type f)
          mapfile -t OBJCPP_SOURCES < <(find . -name "*.mm" -not -path "*/.vscode/*" -not -path "*/xcuserdata/*" -type f)
          mapfile -t SWIFT_SOURCES < <(find . -name "*.swift" -not -path "*/.vscode/*" -not -path "*/xcuserdata/*" -type f)

          TOTAL=$(( ${#C_SOURCES[@]} + ${#CPP_SOURCES[@]} + ${#OBJC_SOURCES[@]} + ${#OBJCPP_SOURCES[@]} + ${#SWIFT_SOURCES[@]} ))
          echo "Found $TOTAL source files: ${#C_SOURCES[@]} C, ${#CPP_SOURCES[@]} C++, ${#OBJC_SOURCES[@]} ObjC, ${#OBJCPP_SOURCES[@]} ObjC++, ${#SWIFT_SOURCES[@]} Swift"

          if [ "$TOTAL" -eq 0 ]; then
            send_telegram "❌ فشل البناء: لم يتم العثور على ملفات مصدر داخل الملف المرسل.

          الملفات المدعومة: .swift .m .mm .c .cpp .cxx .cc"
            exit 1
          fi

          INCLUDE_FLAGS=""
          while IFS= read -r -d '' dir; do
            INCLUDE_FLAGS="$INCLUDE_FLAGS -I\"$dir\""
          done < <(find . -type d -print0)

          COMMON_FLAGS="$ARCH -isysroot \"$SDK_PATH\" -target arm64-apple-ios12.0 -DTARGET_OS_IPHONE=1"
          COMMON_FLAGS="$COMMON_FLAGS -Wno-unused-variable -Wno-unused-function -Wno-deprecated-declarations"
          COMMON_FLAGS="$COMMON_FLAGS -Wno-unused-but-set-variable -Wno-unused-value -Wno-nullability-completeness"
          COMMON_FLAGS="$COMMON_FLAGS -Wno-expansion-to-defined -Wno-nullable-to-nonnull-conversion"
          COMMON_FLAGS="$COMMON_FLAGS -Wno-incompatible-pointer-types -Wno-format -Wno-objc-method-access"
          COMMON_FLAGS="$COMMON_FLAGS -fvisibility=hidden -fvisibility-inlines-hidden"

          COMPILE_OK=true
          OBJ_FILES=()
          COMPILED=0

          compile_file() {
            local src="$1"
            local obj="$2"
            local compiler="$3"
            local extra_flags="$4"

            COMPILED=$((COMPILED + 1))
            echo "[$COMPILED/$TOTAL] Compiling: $src"
            eval "$compiler" -c -o "\"$obj\"" $COMMON_FLAGS $INCLUDE_FLAGS $FRAMEWORK_SEARCH $extra_flags "\"$src\"" 2>&1 | tee -a "$BUILD_LOG"
            if [ ${PIPESTATUS[0]} -ne 0 ]; then
              COMPILE_OK=false
              echo "FAILED: $src"
            fi
            OBJ_FILES+=("$obj")
          }

          for src in "${C_SOURCES[@]}"; do
            obj="${src%.c}.o"
            compile_file "$src" "$obj" "clang" ""
          done

          for src in "${CPP_SOURCES[@]}"; do
            obj="${src%.*}.o"
            compile_file "$src" "$obj" "clang++" "-std=c++17"
          done

          for src in "${OBJC_SOURCES[@]}"; do
            obj="${src%.m}.o"
            compile_file "$src" "$obj" "clang" "-x objective-c -fobjc-arc"
          done

          for src in "${OBJCPP_SOURCES[@]}"; do
            obj="${src%.mm}.o"
            compile_file "$src" "$obj" "clang++" "-x objective-c++ -fobjc-arc -std=c++17"
          done

          if [ "$COMPILE_OK" = false ]; then
            ERROR_MSG=$(tail -80 "$BUILD_LOG" | grep -i "error" | head -40)
            if [ -z "$ERROR_MSG" ]; then
              ERROR_MSG=$(tail -50 "$BUILD_LOG")
            fi
            send_telegram "❌ فشل البناء أثناء الترجمة.

          ${ERROR_MSG}"
            exit 1
          fi

          echo "=== Linking ${#OBJ_FILES[@]} object files ==="

          LINK_FRAMEWORKS="-framework Foundation -framework UIKit -framework Metal -framework MetalKit -framework AVFoundation -framework CoreGraphics -framework QuartzCore -framework Security"

          OBJ_LIST=$(mktemp)
          for obj in "${OBJ_FILES[@]}"; do
            echo "$obj" >> "$OBJ_LIST"
          done

          eval clang++ -dynamiclib -o "\"$OUTPUT\"" $ARCH -isysroot "\"$SDK_PATH\"" \
            -target arm64-apple-ios12.0 \
            -filelist "\"$OBJ_LIST\"" \
            $FRAMEWORK_SEARCH \
            $LINK_FRAMEWORKS $FRAMEWORK_FLAGS \
            -fobjc-arc \
            -dead_strip \
            -Wl,-undefined,dynamic_lookup \
            -install_name @rpath/"$OUTPUT" \
            2>&1 | tee -a "$BUILD_LOG"

          if [ ! -f "$OUTPUT" ] || [ ${PIPESTATUS[0]} -ne 0 ]; then
            ERROR_MSG=$(tail -50 "$BUILD_LOG")
            send_telegram "❌ فشل الربط. سبب الخطأ:

          ${ERROR_MSG}"
            exit 1
          fi

          echo "Build successful: $OUTPUT"
          ls -lh "$OUTPUT"
          file "$OUTPUT"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-dylib
          path: source_code/${{ github.event.inputs.dylib_name }}.dylib

      - name: Send dylib to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ github.event.inputs.chat_id }}
          DYLIB_NAME: ${{ github.event.inputs.dylib_name }}
        run: |
          OUTPUT_FILE="source_code/${DYLIB_NAME}.dylib"
          FILE_SIZE=$(du -sh "${OUTPUT_FILE}" | cut -f1)

          curl -s -F "chat_id=$CHAT_ID" \
            -F "document=@${OUTPUT_FILE};filename=${DYLIB_NAME}.dylib" \
            -F "caption=✅ تم البناء بنجاح!
          📦 الملف: ${DYLIB_NAME}.dylib
          📐 الحجم: ${FILE_SIZE}" \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendDocument"
